<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; font-src 'self' https://cdn.jsdelivr.net; img-src 'self' data: blob: https://static.solved.ac https://ui-avatars.com; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'"
    />
    <title>Goodbye BOJ</title>
    <link rel="preconnect" href="https://static.solved.ac" />
    <link
      rel="stylesheet"
      crossorigin
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"
    />
    <link rel="stylesheet" href="styles.css?v=20260418-1" />
  </head>
  <body>
    <canvas class="graph-flow" id="graph-flow" aria-hidden="true"></canvas>
    <div class="story-nav-current" id="story-nav-current" aria-live="polite"></div>
    <nav class="story-nav" id="story-nav" aria-label="memory sections"></nav>
    <main class="shell">
      <section class="intro" data-category="search" aria-labelledby="search-title">
        <div class="intro-content">
          <h1 class="search-title" id="search-title">BOJ memory</h1>
          <form class="search" id="memory-form">
            <label id="handle-label" for="handle">user id</label>
            <div class="search-row">
              <input id="handle" name="handle" autocomplete="username" required />
              <button type="submit">enter</button>
            </div>
            <p class="form-message" id="form-message" role="status" aria-live="polite"></p>
            <p class="search-note">* PC버전으로 보는 것을 권장합니다.</p>
            <p class="search-note">* 검색에 오류가 있다면 재검색해보시기 바랍니다.</p>
          </form>
        </div>
      </section>

      <section class="memory" id="memory" aria-live="polite"></section>
    </main>

    <script src="config.js?v=20260418-1"></script>
    <script src="app.js?v=20260418-1" type="module"></script>
  </body>
</html>
