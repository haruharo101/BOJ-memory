<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Goodbye BOJ</title>
    <link rel="preconnect" href="https://static.solved.ac" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <canvas class="graph-flow" id="graph-flow" aria-hidden="true"></canvas>
    <nav class="story-nav" id="story-nav" aria-label="memory sections"></nav>
    <main class="shell">
      <section class="intro" data-category="search" aria-labelledby="search-title">
        <div class="intro-content">
          <h1 class="search-title" id="search-title">BOJ memory</h1>
          <form class="search" id="memory-form">
            <label id="handle-label" for="handle">user id</label>
            <div class="search-row">
              <input id="handle" name="handle" autocomplete="username" required />
              <button type="submit">enter</button>
            </div>
            <p class="form-message" id="form-message" role="status" aria-live="polite"></p>
            <p class="search-note">* PC버전으로 보는 것을 권장합니다.</p>
          </form>
        </div>
      </section>

      <section class="memory" id="memory" aria-live="polite"></section>
    </main>

    <script src="config.js"></script>
    <script src="app.js" type="module"></script>
  </body>
</html>
